[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mnemon"
version = "0.1.0"
description = "Persistent project memory and knowledge graph for AI coding agents"
requires-python = ">=3.11"
dependencies = [
    "mcp[cli]>=1.3.0",
    "aiosqlite>=0.20.0",
    "click>=8.1.0",
]

[project.scripts]
mnemon = "mnemon.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["mnemon"]

[tool.uv]
package = true
